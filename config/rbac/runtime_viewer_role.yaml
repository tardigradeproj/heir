# This rule is not used by the project samaritano itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to controlplane.tardigrade.runtime.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: samaritano
    app.kubernetes.io/managed-by: kustomize
  name: runtime-viewer-role
rules:
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes/status
  verbs:
  - get
