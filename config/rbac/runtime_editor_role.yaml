# This rule is not used by the project samaritano itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the controlplane.tardigrade.runtime.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: samaritano
    app.kubernetes.io/managed-by: kustomize
  name: runtime-editor-role
rules:
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes/status
  verbs:
  - get
