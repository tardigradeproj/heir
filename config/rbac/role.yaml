---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  - services
  verbs:
  - create
  - get
  - list
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - get
  - list
  - update
  - watch
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes/finalizers
  verbs:
  - update
- apiGroups:
  - controlplane.tardigrade.runtime.io
  resources:
  - runtimes/status
  verbs:
  - get
  - patch
  - update
