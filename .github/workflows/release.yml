name: Build and Release
on:
  pull_request:
  push:
    tags:
      - 'v*' # Triggers only on semantic version tags (e.g., v2.0.0)

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: GoReleaser Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #  full history to generate the changelog

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup QEMU Emulation
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (Dry-Run Snapshot for PRs)
        if: github.event_name == 'pull_request'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean

      - name: Run GoReleaser (Publish Production Release)
        if: github.event_name != 'pull_request'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}